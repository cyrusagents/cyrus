networks:
  firecrawl:
    driver: bridge
  shared-services:
    external: true

services:
  firecrawl-redis:
    image: redis:7-alpine
    container_name: firecrawl-redis
    networks:
      - firecrawl
    volumes:
      - firecrawl_redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  firecrawl-rabbitmq:
    image: rabbitmq:3-alpine
    container_name: firecrawl-rabbitmq
    networks:
      - firecrawl
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  firecrawl-postgres:
    image: ghcr.io/firecrawl/nuq-postgres:latest
    container_name: firecrawl-postgres
    networks:
      - firecrawl
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - firecrawl_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  playwright-service:
    image: ghcr.io/firecrawl/playwright-service:latest
    container_name: firecrawl-playwright
    networks:
      - firecrawl
    restart: unless-stopped
    environment:
      - PORT=3000
      - PROXY_SERVER=${PROXY_SERVER}
      - PROXY_USERNAME=${PROXY_USERNAME}
      - PROXY_PASSWORD=${PROXY_PASSWORD}
    depends_on:
      firecrawl-redis:
        condition: service_healthy

  firecrawl-api:
    image: ghcr.io/firecrawl/firecrawl:latest
    container_name: firecrawl-api
    networks:
      - firecrawl
      - shared-services
    ports:
      - "127.0.0.1:3002:3002"
    env_file:
      - .env
    environment:
      - PLAYWRIGHT_MICROSERVICE_URL=http://playwright-service:3000/scrape
      - NUQ_RABBITMQ_URL=amqp://firecrawl-rabbitmq:5672
      - NUQ_DATABASE_URL=postgres://postgres:postgres@firecrawl-postgres:5432/postgres
    restart: unless-stopped
    depends_on:
      firecrawl-redis:
        condition: service_healthy
      firecrawl-rabbitmq:
        condition: service_healthy
      firecrawl-postgres:
        condition: service_healthy
      playwright-service:
        condition: service_started

volumes:
  firecrawl_redis_data:
    driver: local
  firecrawl_postgres_data:
    driver: local
